<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Admin</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background:#F0F2F5; }
    .page-body { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .toolbar { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; background:#fff; padding:1rem 1.2rem; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1.5px solid var(--border); margin-bottom:1.5rem; }
    .toolbar input, .toolbar select { flex:1; min-width:150px; }
    .table-wrap { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-sm); border:1.5px solid var(--border); overflow:hidden; }
    .thumb { width:48px; height:48px; object-fit:cover; border-radius:10px; }
    .page-title { font-family:'Fredoka One',cursive; font-size:1.7rem; margin-bottom:1.5rem; display:flex; justify-content:space-between; align-items:center; }
    .edit-btn { padding:.35rem .8rem; border-radius:50px; border:none; font-size:.78rem; font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif; transition:all .2s; }
    .edit-btn:hover { transform:translateY(-1px); }
    .e-edit { background:#DBEAFE; color:#1D4ED8; }
    .e-edit:hover { background:#BFDBFE; }
    .e-del { background:#FEE2E2; color:#DC2626; }
    .e-del:hover { background:#FECACA; }
    .product-name-cell { display:flex; align-items:center; gap:.75rem; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <div class="admin-nav-brand">🧸 SuperNina's Admin</div>
  <div class="admin-nav-links">
    <a href="/admin/products.html" class="active">Products</a>
    <a href="/admin/orders.html">Orders</a>
    <button onclick="adminLogout()">Logout</button>
  </div>
</nav>

<div class="page-body">
  <div class="page-title">
    <span>🧸 Product Management</span>
    <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
  </div>

  <div class="toolbar">
    <input class="input-field" id="search-input" type="text" placeholder="🔍 Search products…" oninput="applyFilter()">
    <select class="input-field" id="cat-filter" style="max-width:200px" onchange="applyFilter()">
      <option value="0">All Categories</option>
    </select>
  </div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Category</th>
          <th style="cursor:pointer" onclick="toggleSort()">Price ↕</th>
          <th>Attributes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="product-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="product-modal" onclick="closeModalOutside(event)">
  <div class="modal-box" style="max-width:520px">
    <h2 id="modal-title" style="font-family:'Fredoka One',cursive;font-size:1.3rem;margin-bottom:1.5rem">Add Product</h2>
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div><label class="form-label">Category</label><select class="input-field" id="f-cat"></select></div>
      <div><label class="form-label">Product Name</label><input class="input-field" id="f-name" type="text" placeholder="e.g. Classic Teddy Bear"></div>
      <div><label class="form-label">Description</label><textarea class="input-field" id="f-desc" rows="3" placeholder="Describe the product…" style="resize:vertical"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div><label class="form-label">Price (฿)</label><input class="input-field" id="f-price" type="number" placeholder="299"></div>
        <div><label class="form-label">Image URL</label><input class="input-field" id="f-img" type="text" placeholder="https://…"></div>
      </div>
      <div>
        <label class="form-label">Image Position <span style="font-weight:400;color:var(--muted)">(crop focus)</span></label>
        <select class="input-field" id="f-imgpos">
          <option value="center">Center (default)</option>
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
          <option value="left">Left</option>
          <option value="right">Right</option>
          <option value="top left">Top Left</option>
          <option value="top right">Top Right</option>
          <option value="bottom left">Bottom Left</option>
          <option value="bottom right">Bottom Right</option>
        </select>
      </div>
      <div>
        <label class="form-label">Attributes <span style="font-weight:400;color:var(--muted)">(JSON, optional)</span></label>
        <textarea class="input-field" id="f-attrs" rows="2" placeholder='{"color":["Red","Blue"],"size":["S","M","L"]}' style="font-family:monospace;font-size:.82rem;resize:vertical"></textarea>
      </div>
      <div id="f-preview" style="display:none">
        <label class="form-label">Image Preview</label>
        <img id="img-preview" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;border:2px solid var(--border)">
      </div>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:1.5rem">
      <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="saveProduct()">Save Product</button>
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
    </div>
    <div id="modal-error" style="color:#DC2626;font-size:.82rem;font-weight:700;margin-top:.75rem;display:none"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let allProducts=[], allCategories=[], editId=null, sortAsc=true;

function showToast(msg){const c=document.getElementById('toast-container');const t=document.createElement('div');t.className='toast';t.innerHTML=msg;c.appendChild(t);setTimeout(()=>{t.classList.add('leaving');setTimeout(()=>t.remove(),300);},2500);}
function adminLogout(){fetch('/api/admin/logout',{method:'POST'}).then(()=>location.href='/admin/login.html');}
function catName(id){return (allCategories.find(c=>c.categoryId===id)||{name:'—'}).name;}

async function load() {
  const r = await fetch('/api/admin/products',{credentials:'same-origin'});
  const d = await r.json();
  allCategories = d.categories; allProducts = d.products;
  const catSel = document.getElementById('cat-filter');
  const fCat = document.getElementById('f-cat');
  allCategories.forEach(c=>{
    catSel.innerHTML+=`<option value="${c.categoryId}">${c.name}</option>`;
    fCat.innerHTML+=`<option value="${c.categoryId}">${c.name}</option>`;
  });
  applyFilter();
}

function applyFilter(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=Number(document.getElementById('cat-filter').value);
  let list=allProducts.filter(p=>(!cat||p.categoryId===cat)&&p.name.toLowerCase().includes(q));
  if(sortAsc) list.sort((a,b)=>a.name.localeCompare(b.name));
  else list.sort((a,b)=>b.name.localeCompare(a.name));
  renderTable(list);
}
function toggleSort(){sortAsc=!sortAsc;applyFilter();}

function renderTable(list){
  const tb=document.getElementById('product-tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--muted)">No products found.</td></tr>';return;}
  tb.innerHTML='';
  list.forEach(p=>{
    const attrsText=p.attributes?Object.keys(p.attributes).map(k=>`${k}: ${p.attributes[k].join(', ')}`).join(' | '):'—';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="product-name-cell">
        <img src="${p.imageUrl}" class="thumb" onerror="this.src='https://placehold.co/48x48/FFE5F0/FF4F8B?text=🧸'">
        <span style="font-weight:700">${p.name}</span>
      </div></td>
      <td><span class="badge badge-paid">${catName(p.categoryId)}</span></td>
      <td style="font-family:'Fredoka One',cursive;color:var(--pink)">฿${p.price}</td>
      <td style="font-size:.78rem;color:var(--muted);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${attrsText}</td>
      <td style="display:flex;gap:.4rem;padding:.6rem 1rem">
        <button class="edit-btn e-edit" onclick="editProduct(${p.productId})">✏️ Edit</button>
        <button class="edit-btn e-del" onclick="deleteProduct(${p.productId})">🗑</button>
      </td>`;
    tb.appendChild(tr);
  });
}

function openModal(){
  editId=null;
  document.getElementById('modal-title').textContent='Add Product';
  ['f-name','f-desc','f-price','f-img','f-attrs'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-imgpos').value = 'center';
  document.getElementById('f-cat').value=allCategories[0]?.categoryId||'';
  document.getElementById('f-preview').style.display='none';
  document.getElementById('modal-error').style.display='none';
  document.getElementById('product-modal').classList.add('open');
}

function closeModal(){document.getElementById('product-modal').classList.remove('open');}
function closeModalOutside(e){if(e.target===e.currentTarget)closeModal();}

function editProduct(id){
  const p=allProducts.find(x=>x.productId===id);if(!p)return;
  editId=id;
  document.getElementById('modal-title').textContent='Edit Product';
  document.getElementById('f-cat').value=p.categoryId;
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-desc').value=p.description;
  document.getElementById('f-price').value=p.price;
  document.getElementById('f-img').value=p.imageUrl||'';
  document.getElementById('f-imgpos').value=p.imagePosition||'center';
  document.getElementById('f-attrs').value=p.attributes?JSON.stringify(p.attributes,null,2):'';
  if(p.imageUrl){
    document.getElementById('img-preview').src=p.imageUrl;
    document.getElementById('f-preview').style.display='block';
  }
  document.getElementById('modal-error').style.display='none';
  document.getElementById('product-modal').classList.add('open');
}

document.getElementById('f-img').addEventListener('input',function(){
  const v=this.value.trim();
  if(v){document.getElementById('img-preview').src=v;document.getElementById('f-preview').style.display='block';}
  else{document.getElementById('f-preview').style.display='none';}
});

async function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  const price=Number(document.getElementById('f-price').value);
  const errEl=document.getElementById('modal-error');
  if(!name||!price){errEl.textContent='⚠️ Name and price are required.';errEl.style.display='block';return;}
  let attrs=undefined;
  const raw=document.getElementById('f-attrs').value.trim();
  if(raw){try{attrs=JSON.parse(raw);}catch{errEl.textContent='⚠️ Invalid JSON for attributes.';errEl.style.display='block';return;}}

  const payload={categoryId:Number(document.getElementById('f-cat').value),name,description:document.getElementById('f-desc').value,price,imageUrl:document.getElementById('f-img').value,imagePosition:document.getElementById('f-imgpos').value||'center',attributes:attrs};
  const url=editId?`/api/admin/products/${editId}`:'/api/admin/products';
  const method=editId?'PUT':'POST';
  const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(payload)});
  if(r.ok){closeModal();showToast(editId?'✅ Product updated!':'✅ Product added!');load();}
  else{errEl.textContent='❌ Failed to save.';errEl.style.display='block';}
}

async function deleteProduct(id){
  if(!confirm('Delete this product?'))return;
  await fetch(`/api/admin/products/${id}`,{method:'DELETE',credentials:'same-origin'});
  showToast('🗑 Product deleted');
  load();
}

document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
