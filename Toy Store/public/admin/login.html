<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — SuperNina's</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; background:linear-gradient(135deg,#1A1A2E,#16213E,#0F3460); }
    .login-card { background:#fff; border-radius:var(--radius-xl); padding:3rem 2.5rem; width:100%; max-width:400px; box-shadow:0 24px 80px rgba(0,0,0,.4); animation:bounceIn .7s cubic-bezier(.34,1.56,.64,1); }
    .brand { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--pink); text-align:center; margin-bottom:.3rem; }
    .subtitle { text-align:center; font-size:.85rem; color:var(--muted); font-weight:600; margin-bottom:2rem; }
    .login-label { display:block; font-weight:800; font-size:.82rem; margin-bottom:.4rem; color:var(--text); text-transform:uppercase; letter-spacing:.5px; }
    .error-msg { background:#FEE2E2; color:#DC2626; border-radius:var(--radius-sm); padding:.7rem 1rem; font-size:.85rem; font-weight:700; margin-top:1rem; display:none; }
    .btn-login { width:100%; justify-content:center; margin-top:1.5rem; font-size:1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="text-align:center;font-size:2.5rem;margin-bottom:.5rem">🔐</div>
    <div class="brand">SuperNina's Admin</div>
    <div class="subtitle">Sign in to manage your store</div>

    <div style="display:flex;flex-direction:column;gap:1rem">
      <div>
        <label class="login-label">Username</label>
        <input class="input-field" id="username" type="text" placeholder="Enter name" autofocus>
      </div>
      <div>
        <label class="login-label">Password</label>
        <input class="input-field" id="password" type="password" placeholder="••••••••" onkeypress="if(event.key==='Enter')login()">
      </div>
    </div>

    <button class="btn btn-primary btn-lg btn-login" id="login-btn" onclick="login()">
      Sign In →
    </button>

    <div class="error-msg" id="error">⚠️ Invalid username or password</div>
  </div>

  <script src="login.js"></script>
</body>
</html>
