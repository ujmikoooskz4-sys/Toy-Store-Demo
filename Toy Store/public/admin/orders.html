<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
  <title>Orders — Admin</title>
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background:#F0F2F5; }
    .page-body { max-width:1100px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .order-card { background:#fff; border-radius:var(--radius); padding:1.5rem; box-shadow:var(--shadow-sm); border:1.5px solid var(--border); margin-bottom:1rem; animation:fadeUp .4s ease both; transition:box-shadow .2s; }
    .order-card:hover { box-shadow:var(--shadow-md); }
    .order-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:.5rem; margin-bottom:.75rem; }
    .order-info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.4rem; margin-bottom:1rem; }
    .order-info-item { font-size:.8rem; color:var(--muted); font-weight:700; }
    .order-info-item span { display:block; color:var(--text); font-weight:600; margin-top:.1rem; }
    .status-actions { display:flex; flex-wrap:wrap; gap:.5rem; }
    .s-btn { padding:.35rem .9rem; border-radius:50px; border:none; font-size:.78rem; font-weight:800; cursor:pointer; transition:all .2s; font-family:'Nunito',sans-serif; }
    .s-btn:hover { transform:translateY(-1px); }
    .s-pending { background:#FFF3C4; color:#B45309; }
    .s-pending:hover { background:#FDE68A; }
    .s-shipped { background:#DBEAFE; color:#1D4ED8; }
    .s-shipped:hover { background:#BFDBFE; }
    .s-completed { background:#D1FAE5; color:#065F46; }
    .s-completed:hover { background:#A7F3D0; }
    .s-delete { background:#FEE2E2; color:#DC2626; }
    .s-delete:hover { background:#FECACA; }
    .items-list { font-size:.82rem; background:var(--bg); padding:.6rem .9rem; border-radius:var(--radius-sm); color:var(--muted); }
    .page-title { font-family:'Fredoka One',cursive; font-size:1.7rem; margin-bottom:1.5rem; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <div class="admin-nav-brand">🧸 SuperNina's Admin</div>
  <div class="admin-nav-links">
    <a href="/admin/products.html">Products</a>
    <a href="/admin/orders.html" class="active">Orders</a>
    <button onclick="adminLogout()">Logout</button>
  </div>
</nav>

<div class="page-body">
  <h1 class="page-title">📋 Order Management</h1>

  <!-- Stats -->
  <div class="grid-4 stagger" style="margin-bottom:2.5rem">
    <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-label">Total Orders</div><div class="stat-value" id="total-orders">0</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Revenue</div><div class="stat-value text-pink" id="total-revenue">฿0</div></div>
    <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-label">Pending</div><div class="stat-value" style="color:#B45309" id="pending-count">0</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-label">Completed</div><div class="stat-value" style="color:#065F46" id="completed-count">0</div></div>
  </div>

  <div id="orders-list"></div>
</div>

<script src="orders.js"></script>
<script>
function adminLogout() {
  fetch('/api/admin/logout',{method:'POST'}).then(()=>location.href='/admin/login.html');
}
</script>
</body>
</html>
